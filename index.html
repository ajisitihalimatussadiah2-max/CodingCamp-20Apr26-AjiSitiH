<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ── Greeting Section ── -->
    <section class="greeting-section">
        <div class="name-form">
            <input type="text" id="name-input" placeholder="Enter your name…" maxlength="40">
            <button onclick="handleSetName()">Set Name</button>
        </div>
        <div id="greeting-text"></div>
        <div id="datetime-text"></div>
        <button id="theme-toggle" onclick="toggleTheme()" aria-label="Switch to dark mode">🌙 Dark Mode</button>
    </section>

    <!-- ── Focus Timer Section ── -->
    <section class="timer-section">
        <h2>POMODORO TIMER</h2>
        <div class="countdown" id="timer-display">25:00</div>
        <div class="timer-buttons">
            <button class="btn-start" onclick="startTimer()">Start</button>
            <button class="btn-stop"  onclick="stopTimer()">Stop</button>
            <button class="btn-reset" onclick="resetTimer()">Reset</button>
        </div>
    </section>

    <!-- ── To-Do List Section ── -->
    <section class="todo-section">
        <h2>My To-Do List</h2>
        <div class="row">
            <input type="text" id="input-box" placeholder="Mau bikin apa nich?">
            <button onclick="addTask()">Add</button>
        </div>
        <p id="duplicate-error" class="duplicate-error" aria-live="polite" hidden>Task already exists!</p>
        <ul id="list-container"></ul>
    </section>

    <!-- ── Quick Links Section ── -->
    <section class="quicklinks-section">
        <h2>Quick Links</h2>
        <div class="row">
            <input type="text" id="link-name-input" placeholder="Link name…" maxlength="60">
            <input type="url"  id="link-url-input"  placeholder="https://…"  maxlength="2048">
            <button onclick="addLink()">Add Link</button>
        </div>
        <p id="link-error" class="link-error" aria-live="polite" hidden></p>
        <div id="links-container"></div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
